name: vna_characterization
version: 1
description: >
  Vector Network Analyzer (VNA) characterization of cable/interconnect
  RF performance. Captures S-parameters (S11, S21, etc.) across a frequency
  range.

fields:
  - name: cable_model
    field_type: model_ref
    model_ref_type: cable_models
    required: true
    description: Reference to the cable model being tested

  - name: vna_instrument
    field_type: string
    required: true
    description: VNA instrument model (e.g. "Keysight E5063A")

  - name: frequency_start_hz
    field_type: float
    required: true
    description: Start frequency in Hz

  - name: frequency_stop_hz
    field_type: float
    required: true
    description: Stop frequency in Hz

  - name: num_points
    field_type: integer
    required: true
    description: Number of frequency points in the sweep

  - name: calibration_type
    field_type: enum
    required: true
    enum_values: ["SOLT", "TRL", "electronic_cal", "other"]
    description: VNA calibration method used

  - name: port_impedance_ohm
    field_type: float
    required: false
    default: 50.0
    description: Reference impedance in ohms

files:
  - name: manifest_csv
    filename_pattern: "manifest.csv"
    file_format: csv
    required: true
    description: >
      CSV manifest with columns: filename, cable_length_mm, description, [notes]

  - name: s_parameter_files
    filename_pattern: "raw/*.s2p"
    file_format: s2p
    required: true
    description: Touchstone S2P files with S-parameter data

processing_steps:
  - name: parse_s2p
    processor: src.processing.vna.ParseS2P
    description: Parse Touchstone files and extract S-parameter matrices
    outputs: ["parsed_s_params_csv"]

  - name: compute_insertion_loss
    processor: src.processing.vna.ComputeInsertionLoss
    description: Compute insertion loss from S21
    depends_on: ["parse_s2p"]
    outputs: ["insertion_loss_csv", "insertion_loss_plot"]

aggregation:
  - name: vna_summary
    aggregator: src.aggregation.vna.VNASummary
    description: Aggregate VNA results across experiments
    outputs: ["vna_comparison_table", "vna_overlay_plot"]
