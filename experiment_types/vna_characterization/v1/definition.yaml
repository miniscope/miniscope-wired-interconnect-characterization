name: vna_characterization
version: 1
description: >
  Vector Network Analyzer (VNA) characterization of cable/interconnect
  RF performance. Captures S-parameters (S11, S21, etc.) across a frequency
  range using Touchstone .s2p files.

fields:
  - name: cable_model
    field_type: model_ref
    model_ref_type: cable_models
    required: false
    description: >
      Reference to the cable type being tested (e.g. coax_spi_sci_40awg).
      This identifies the cable type, not an individual cable instance.

  - name: vna_instrument
    field_type: string
    required: true
    description: VNA instrument model (e.g. "Keysight E5063A")

  - name: calibration_type
    field_type: enum
    required: true
    enum_values: ["SOLT", "TRL", "electronic_cal", "other"]
    description: VNA calibration method used

  - name: port_impedance_ohm
    field_type: float
    required: false
    default: 50.0
    description: Reference impedance in ohms

files:
  - name: manifest_csv
    filename_pattern: "manifest.csv"
    file_format: csv
    required: true
    description: >
      CSV manifest with columns: filename (required, path relative to raw/),
      cable_length_mm (required), [description], [notes].

  - name: s_parameter_files
    filename_pattern: "raw/*.s2p"
    file_format: s2p
    required: true
    description: >
      Touchstone .s2p files with 2-port S-parameter data. Frequency range
      and number of points are extracted from the file automatically.

processing_steps:
  - name: process_vna
    processor: src.processing.vna.ProcessVNA
    description: Parse Touchstone files, extract S-parameters, compute insertion loss
    outputs: ["vna_metrics_csv", "vna_traces_csv", "vna_summary_json"]

aggregation:
  - name: vna_summary
    aggregator: src.aggregation.vna.VNASummary
    description: Aggregate VNA results across experiments
    outputs: ["vna_comparison_table", "vna_overlay_plot"]
