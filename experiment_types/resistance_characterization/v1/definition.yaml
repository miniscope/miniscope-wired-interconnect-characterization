name: resistance_characterization
version: 1
description: >
  Round-trip DC resistance measurement of coaxial cable conductors.
  Each measurement is taken by looping the signal wire back through the
  ground shielding, so the measured value is the round-trip resistance
  of one coaxial conductor. Typically repeated across multiple conductors
  and mating cycles.

fields:
  - name: cable_model
    field_type: model_ref
    model_ref_type: cable_models
    required: false
    description: >
      Reference to the cable type being tested (e.g. coax_spi_sci_40awg).
      This identifies the cable type, not an individual cable instance.

  - name: connector_model
    field_type: model_ref
    model_ref_type: connector_models
    required: false
    description: Reference to the connector model (if separate from cable)

  - name: measurement_instrument
    field_type: string
    required: true
    description: Instrument used for resistance measurement (e.g. "Keithley 2400")

  - name: temperature_c
    field_type: float
    required: false
    default: 25.0
    description: Ambient temperature during measurement in Celsius

  - name: mating_cycle
    field_type: integer
    required: false
    description: Mating cycle count at time of measurement

  - name: measurement_method
    field_type: enum
    required: true
    enum_values: ["four_wire", "two_wire"]
    description: Resistance measurement method

files:
  - name: measurements_csv
    filename_pattern: "measurements.csv"
    file_format: csv
    required: true
    description: >
      CSV with columns: resistance_ohm (required), cable_length_mm (required),
      [notes]. resistance_ohm is the round-trip resistance in ohms (signal wire
      looped back through ground shielding). cable_length_mm is the physical
      length of the cable instance under test.

processing_steps:
  - name: normalize_resistance
    processor: src.processing.resistance.NormalizeResistance
    description: Normalize raw CSV, compute resistance per meter
    outputs: ["normalized_resistance_csv", "resistance_summary_json"]

aggregation:
  - name: resistance_summary
    aggregator: src.aggregation.resistance.ResistanceSummary
    description: Aggregate resistance measurements across experiments
    outputs: ["resistance_summary_table", "resistance_boxplot"]
